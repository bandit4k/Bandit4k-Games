<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bandit4K Launcher</title>

<style>
body{
    margin:0;
    background:#0a0a0a;
    color:white;
    font-family:Arial;
}

/* TOP HEADER */
header{
    text-align:center;
    padding:30px;
    background:#111;
    border-bottom:2px solid red;
}

header h1{
    margin:0;
    font-size:32px;
}

header p{
    color:#aaa;
}

/* GAME GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    padding:20px;
}

/* GAME CARD */
.card{
    background:#151515;
    border:2px solid #222;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:.2s;
}

.card:hover{
    transform:translateY(-6px);
    border-color:red;
    box-shadow:0 0 15px red;
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
}

.card h3{
    text-align:center;
    padding:10px;
}

/* POPUP LAUNCHER */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    display:none;
    justify-content:center;
    align-items:center;
}

.panel{
    background:#111;
    border:2px solid red;
    padding:25px;
    width:400px;
    max-width:90%;
    text-align:center;
    border-radius:12px;
}

.btn{
    display:inline-block;
    padding:10px 20px;
    margin-top:15px;
    background:red;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.close{
    margin-top:10px;
    cursor:pointer;
    color:#aaa;
}
</style>
</head>

<body>

<header>
<h1>🎮 Bandit4K Games</h1>
<p>Click a game to launch</p>
</header>

<div class="grid">

<!-- GAME 1 -->
<div class="card" onclick="openGame('FNAF 1','https://example.com')">
<img src="https://images.unsplash.com/photo-1520975922284-9b456f9a1d0b?w=800">
<h3>FNAF 1</h3>
</div>

<!-- GAME 2 -->
<div class="card" onclick="openGame('FNAF 2','https://example.com')">
<img src="https://images.unsplash.com/photo-1509228468518-180dd4864904?w=800">
<h3>FNAF 2</h3>
</div>

<!-- GAME 3 -->
<div class="card" onclick="openGame('FNAF 3','https://example.com')">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?w=800">
<h3>FNAF 3</h3>
</div>

<!-- GAME 4 -->
<div class="card" onclick="openGame('FNAF 4','https://example.com')">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=800">
<h3>FNAF 4</h3>
</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">

<div class="panel">
<h2 id="title"></h2>

<a id="play" class="btn" target="_blank">Play Game</a>

<div class="close" onclick="closeGame()">Close</div>
</div>

</div>

<script>
function openGame(name,url){
    document.getElementById("title").innerText = name;
    document.getElementById("play").href = url;
    document.getElementById("popup").style.display = "flex";
}

function closeGame(){
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
