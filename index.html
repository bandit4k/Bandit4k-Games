<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Xbox Game Launcher</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:white;
  font-family:Arial;
}

/* TOP BAR */
header{
  padding:20px;
  background:#111;
  border-bottom:2px solid red;
}
header h1{
  margin:0;
}

/* ROWS */
.row{
  padding:15px;
}
.row h2{
  margin:10px 0;
  font-size:18px;
  color:#ccc;
}

/* HORIZONTAL SCROLL */
.games{
  display:flex;
  overflow-x:auto;
  gap:12px;
  padding-bottom:10px;
}

/* GAME TILE */
.tile{
  min-width:160px;
  background:#1a1a1a;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:.2s;
  border:2px solid #222;
}
.tile:hover{
  transform:scale(1.08);
  border-color:red;
  box-shadow:0 0 12px red;
}
.tile img{
  width:100%;
  height:100px;
  object-fit:cover;
}
.tile p{
  margin:8px;
  font-size:14px;
}

/* LAUNCHER */
.launcher{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  display:none;
  justify-content:center;
  align-items:center;
}
.panel{
  width:800px;
  max-width:95%;
  height:500px;
  background:#111;
  border:2px solid red;
  border-radius:12px;
  display:flex;
  flex-direction:column;
}

iframe{
  flex:1;
  border:none;
  background:black;
}

.controls{
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  background:red;
  border:none;
  padding:8px 12px;
  color:white;
  cursor:pointer;
  border-radius:6px;
}
</style>
</head>

<body>

<header>
<h1>🎮 Xbox Game Launcher</h1>
</header>

<div id="app"></div>

<!-- LAUNCHER -->
<div class="launcher" id="launcher">
  <div class="panel">
    <iframe id="frame"></iframe>
    <div class="controls">
      <span id="title">Game</span>
      <div>
        <button onclick="closeGame()">Back</button>
        <button onclick="openFull()">Fullscreen</button>
      </div>
    </div>
  </div>
</div>

<script>

const DATA_URL = "https://www.onlinegames.io/media/plugins/genGames/embed.json";

let currentUrl = "";

// LOAD GAMES
fetch(DATA_URL)
.then(res => res.json())
.then(data => buildUI(data))
.catch(err => {
  document.getElementById("app").innerHTML = "Failed to load games.";
});

function buildUI(data){

  const app = document.getElementById("app");

  // We’ll make ONE Xbox-style row first (Featured)
  const row = document.createElement("div");
  row.className = "row";

  row.innerHTML = `<h2>🎮 Featured Games</h2>`;

  const container = document.createElement("div");
  container.className = "games";

  data.forEach(game => {

    const tile = document.createElement("div");
    tile.className = "tile";

    tile.innerHTML = `
      <img src="${game.thumb || game.image || ""}">
      <p>${game.title}</p>
    `;

    tile.onclick = () => openGame(game.title, game.embed || game.url);

    container.appendChild(tile);
  });

  row.appendChild(container);
  app.appendChild(row);
}

// OPEN GAME
function openGame(title,url){

  if(!url) return;

  currentUrl = url;

  document.getElementById("frame").src = url;
  document.getElementById("title").innerText = title;

  document.getElementById("launcher").style.display = "flex";
}

function closeGame(){
  document.getElementById("launcher").style.display = "none";
  document.getElementById("frame").src = "";
}

function openFull(){
  window.open(currentUrl, "_blank");
}

</script>

</body>
</html>
