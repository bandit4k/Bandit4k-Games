<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Xbox Game Launcher</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:white;
  font-family:Arial;
}

header{
  padding:20px;
  background:#111;
  border-bottom:2px solid red;
}

header h1{
  margin:0;
}

/* ROW */
.row{
  padding:20px;
}
.row h2{
  color:#aaa;
}

/* SCROLL */
.games{
  display:flex;
  overflow-x:auto;
  gap:12px;
}

/* TILE */
.tile{
  min-width:170px;
  background:#1a1a1a;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:.2s;
  border:2px solid #222;
}

.tile:hover{
  transform:scale(1.08);
  border-color:red;
  box-shadow:0 0 12px red;
}

.tile img{
  width:100%;
  height:110px;
  object-fit:cover;
}

.tile p{
  margin:8px;
  font-size:14px;
}

/* LAUNCHER */
.launcher{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  display:none;
  justify-content:center;
  align-items:center;
}

.panel{
  width:900px;
  max-width:95%;
  height:520px;
  background:#111;
  border:2px solid red;
  border-radius:12px;
  display:flex;
  flex-direction:column;
}

iframe{
  flex:1;
  border:none;
}

.controls{
  padding:10px;
  display:flex;
  justify-content:space-between;
}

button{
  background:red;
  border:none;
  padding:8px 12px;
  color:white;
  cursor:pointer;
  border-radius:6px;
}
</style>
</head>

<body>

<header>
<h1>🎮 Xbox Game Launcher</h1>
</header>

<div id="app"></div>

<!-- POPUP -->
<div class="launcher" id="launcher">
  <div class="panel">
    <iframe id="frame"></iframe>
    <div class="controls">
      <span id="title"></span>
      <div>
        <button onclick="closeGame()">Back</button>
        <button onclick="openFull()">Fullscreen</button>
      </div>
    </div>
  </div>
</div>

<script>

let currentUrl = "";

/* 🎮 FULL STATIC GAME LIST (ADD EVERYTHING HERE) */
const games = [
  {
    title: "Game 1",
    embed: "https://example.com",
    img: "https://images.unsplash.com/photo-1520975922284-9b456f9a1d0b?w=800"
  },
  {
    title: "Game 2",
    embed: "https://example.com",
    img: "https://images.unsplash.com/photo-1509228468518-180dd4864904?w=800"
  },
  {
    title: "Game 3",
    embed: "https://example.com",
    img: "https://images.unsplash.com/photo-1511512578047-dfb367046420?w=800"
  }
];

/* BUILD UI */
function build(){

  const app = document.getElementById("app");

  const row = document.createElement("div");
  row.className = "row";
  row.innerHTML = "<h2>🎮 Featured Games</h2>";

  const container = document.createElement("div");
  container.className = "games";

  games.forEach(g => {

    const tile = document.createElement("div");
    tile.className = "tile";

    tile.innerHTML = `
      <img src="${g.img}">
      <p>${g.title}</p>
    `;

    tile.onclick = () => openGame(g.title, g.embed);

    container.appendChild(tile);
  });

  row.appendChild(container);
  app.appendChild(row);
}

/* OPEN */
function openGame(title,url){

  if(!url || url === "https://example.com"){
    alert("No embed added yet.");
    return;
  }

  currentUrl = url;

  document.getElementById("frame").src = url;
  document.getElementById("title").innerText = title;
  document.getElementById("launcher").style.display = "flex";
}

/* CLOSE */
function closeGame(){
  document.getElementById("launcher").style.display = "none";
  document.getElementById("frame").src = "";
}

/* FULLSCREEN */
function openFull(){
  window.open(currentUrl, "_blank");
}

build();

</script>

</body>
</html>
